services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: humanly-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-humanly_prod}
      POSTGRES_USER: ${POSTGRES_USER:-humanly_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/backend/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-humanly_user} -d ${POSTGRES_DB:-humanly_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - humanly-network

  redis:
    image: redis:7-alpine
    container_name: humanly-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - humanly-network

  inference:
    # Unified multi-model inference service (Python/FastAPI). detector is the first model, served at /models/detector.
    # Production uses the CI-prebuilt image pushed to Artifact Registry (not build:); cluster-internal only, not exposed through nginx.
    image: ${INFERENCE_IMAGE:?INFERENCE_IMAGE is required}
    container_name: humanly-inference
    # Private model weights are NOT in the image; they are placed on the host at
    # /opt/humanly/models (out-of-band via scp) and bind-mounted read-only at runtime.
    environment:
      MODEL_PATH: /models/detector/model.joblib
      MIN_KEYDOWN: "50"   # detector quality gate: min keystrokes to judge (runtime policy, not in the model)
      DETECTOR_THRESHOLD: "0.85"   # agent verdict cutoff; overrides the threshold stored in the model
    volumes:
      - /opt/humanly/models:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - humanly-network

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: humanly-backend
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      INFERENCE_URL: http://inference:8000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      inference:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - humanly-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend-user:
    image: ${FRONTEND_USER_IMAGE:?FRONTEND_USER_IMAGE is required}
    container_name: humanly-frontend-user
    environment:
      PORT: 3002
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - humanly-network

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: humanly-frontend
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - humanly-network

  nginx:
    image: nginx:alpine
    container_name: humanly-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-user:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - humanly-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  humanly-network:
    driver: bridge
